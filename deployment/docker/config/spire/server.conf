server {
  bind_address = "0.0.0.0"
  bind_port = "8081"
  trust_domain = "agentmesh.local"
  data_dir = "/opt/spire/conf/server/data"
  log_level = "INFO"
  ca_ttl = "168h"
  default_x509_svid_ttl = "1h"
  default_jwt_svid_ttl  = "5m"
}

plugins {
  DataStore "sql" {
    plugin_data {
      database_type = "sqlite3"
      connection_string = "/opt/spire/conf/server/data/datastore.sqlite3"
    }
  }

  NodeAttestor "join_token" {
    plugin_data {}
  }

  KeyManager "disk" {
    plugin_data {
      keys_path = "/opt/spire/conf/server/data/keys.json"
    }
  }
}
